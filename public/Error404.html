<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page Not Found - 404 Error</title>
    <link rel="stylesheet" href="css/error404.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head> 
<body>

    <div class="error-container">
        <div class="error-content">
            <h1 class="error-code">404</h1>
            <div class="error-icon">
                <i class="fas fa-exclamation-triangle"></i>
            </div>
            <h2 class="error-message">Oops! Page Not Found</h2>
            <p class="error-desc">The URL you are looking for might have been removed, had its name changed, or is temporarily unavailable.</p>
            <a href="index.html" class="back-home-btn"><i class="fas fa-home"></i> Back to Home Page</a>
        </div>
    </div>

</body>
</html>
