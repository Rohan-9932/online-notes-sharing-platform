<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Dashboard - Online Notes</title>
    <link rel="stylesheet" href="css/index.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .dashboard-container { max-width: 1000px; margin: 50px auto; padding: 20px; background: #fff; box-shadow: 0 4px 15px rgba(0,0,0,0.1); border-radius: 8px; }
        .dashboard-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #f1f1f1; padding-bottom: 15px; margin-bottom: 20px; }
        .dashboard-header h2 { font-weight: 600; color: #333; }
        .notes-table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        .notes-table th, .notes-table td { padding: 12px 15px; text-align: left; border-bottom: 1px solid #ddd; font-family: 'Poppins', sans-serif; }
        .notes-table th { background-color: #f8f9fa; color: #555; font-weight: 600; }
        .btn-delete { background: #ff4d4d; color: white; border: none; padding: 6px 12px; border-radius: 4px; cursor: pointer; font-weight: 600; font-size: 13px; transition: 0.3s; }
        .btn-delete:hover { background: #e03333; }
        .no-notes { text-align: center; padding: 30px; color: #777; font-size: 16px; }
    </style>
</head>
<body>

    <nav>
        <div class="container nav-container">
            <div class="logo">ONLINE<span>NOTES.</span></div>
            <ul class="nav-links">
                <li><a href="index.html">HOME</a></li>
                <li><a href="Addser.html">UPLOAD NOTE</a></li>
                <li><a href="/api/logout" style="color: #ff4d4d;">LOGOUT</a></li>
            </ul>
        </div>
    </nav>

    <div class="dashboard-container">
        <div class="dashboard-header">
            <h2>My Uploaded Notes</h2>
            <p id="welcome-user" style="font-weight: 600; color: #555;"></p>
        </div>

        <div id="table-wrapper">
            </div>
    </div>

    <script>
        // পেজ লোড হওয়ার সাথে সাথে ইউজারের নোটগুলো নিয়ে আসবে
        document.addEventListener("DOMContentLoaded", async () => {
            // ১. ইউজারের নাম চেক করা
            const userRes = await fetch('/api/current-user');
            const userData = await userRes.json();
            
            if (!userData.loggedIn) {
                alert("Please login first!");
                window.location.href = "login.html";
                return;
            }
            document.getElementById('welcome-user').innerText = `User: ${userData.user.fullname}`;

            // ২. নোটের লিস্ট লোড করা
            loadMyNotes();
        });

        async function loadMyNotes() {
            try {
                const response = await fetch('/api/my-notes');
                const notes = await response.json();
                const wrapper = document.getElementById('table-wrapper');

                if (notes.length === 0) {
                    wrapper.innerHTML = `<p class="no-notes">You haven't uploaded any notes yet!</p>`;
                    return;
                }

                let tableHtml = `
                    <table class="notes-table">
                        <thead>
                            <tr>
                                <th>Title</th>
                                <th>Subject</th>
                                <th>Semester</th>
                                <th>Type</th>
                                <th>Action</th>
                            </tr>
                        </thead>
                        <tbody>
                `;

                notes.forEach(note => {
                    tableHtml += `
                        <tr>
                            <td><strong>${note.title}</strong></td>
                            <td>${note.subject}</td>
                            <td>Semester ${note.semester}</td>
                            <td><span class="badge ${note.type === 'free' ? 'badge-free' : 'badge-paid'}">${note.type.toUpperCase()}</span></td>
                            <td>
                                <button class="btn-delete" onclick="deleteNote(${note.id})">
                                    <i class="fas fa-trash-alt"></i> Delete
                                </button>
                            </td>
                        </tr>
                    `;
                });

                tableHtml += `</tbody></table>`;
                wrapper.innerHTML = tableHtml;

            } catch (error) {
                console.error("Error loading notes:", error);
            }
        }

        // নোট ডিলিট করার ফাংশন 
        async function deleteNote(noteId) {
            if (confirm("Are you sure you want to delete this note?")) {
                try {
                    const response = await fetch(`/api/delete-note/${noteId}`, {
                        method: 'DELETE'
                    });

                    if (response.ok) {
                        alert("Note deleted successfully!");
                        loadMyNotes(); // টেবিলটি রিফ্রেশ করবে
                    } else {
                        alert("Failed to delete note.");
                    }
                } catch (error) {
                    console.error("Error deleting note:", error);
                }
            }
        }
    </script>
</body>
</html>
