<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Online Notes</title>
    <link rel="stylesheet" href="css/index.css">
    <link rel="stylesheet" href="css/Admin.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <nav>
        <div class="container nav-container">
            <div class="logo">ONLINE<span>NOTES.</span></div>
            <ul class="nav-links">
                <li><a href="index.html">HOME</a></li>
                <li><a href="profile.html">MY PROFILE</a></li>
                <li><a href="#" class="active">ADMIN PANEL</a></li>
            </ul>
        </div>
    </nav>

    <div class="admin-wrapper">
        <div class="container">
            <h1 class="admin-title"><i class="fas fa-user-shield"></i> Admin Control Panel</h1>
            
            <div class="admin-grid">
                
                <div class="admin-card">
                    <h3><i class="fas fa-users"></i> Manage Users</h3>
                    <div class="table-responsive">
                        <table class="admin-table">
                            <thead>
                                <tr>
                                    <th>User Name</th>
                                    <th>Role</th>
                                    <th>Action</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr>
                                    <td>Rohan Hazra</td>
                                    <td><span class="role-badge admin">Admin</span></td>
                                    <td><button class="action-btn block-btn">Block</button></td>
                                </tr>
                                <tr>
                                    <td>Ayan Das</td>
                                    <td><span class="role-badge user">Creator</span></td>
                                    <td><button class="action-btn block-btn">Block</button></td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>

                <div class="admin-card">
                    <h3><i class="fas fa-file-alt"></i> Manage & Delete Notes</h3>
                    <div class="table-responsive">
                        <table class="admin-table">
                            <thead>
                                <tr>
                                    <th>Note Title</th>
                                    <th>Author</th>
                                    <th>Action</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr>
                                    <td>DBMS Complete Notes</td>
                                    <td>Rohan</td>
                                    <td><button class="action-btn delete-btn"><i class="fas fa-trash-alt"></i> Delete</button></td>
                                </tr>
                                <tr>
                                    <td>Computer Networks Core</td>
                                    <td>Ayan</td>
                                    <td><button class="action-btn delete-btn"><i class="fas fa-trash-alt"></i> Delete</button></td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>

            </div>
        </div>
    </div>

</body>
</html>
