<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Payment - Online Notes</title>
    <link rel="stylesheet" href="css/index.css">
    <link rel="stylesheet" href="css/payment.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <div class="payment-wrapper">
        <div class="payment-box">
            <div class="payment-header">
                <h2><i class="fas fa-shield-alt"></i> Secure Checkout</h2>
                <p>Complete your payment to download the note instantly.</p>
            </div>
            
            <div class="order-summary">
                <span class="item-name">Computer Networks Core PDF</span>
                <span class="item-price">₹99</span>
            </div>

            <form class="payment-form" onsubmit="event.preventDefault(); alert('Payment Successful! Your download will start now.');">
                <label class="method-option">
                    <input type="radio" name="pay-method" checked>
                    <span><i class="purple-icon fas fa-qrcode"></i> UPI / QR Code (PhonePe, GPay)</span>
                </label>
                <label class="method-option">
                    <input type="radio" name="pay-method">
                    <span><i class="blue-icon fas fa-credit-card"></i> Credit / Debit Card</span>
                </label>

                <div class="qr-placeholder">
                    <i class="fas fa-qrcode fa-6x"></i>
                    <p>Scan QR code with any UPI App</p>
                </div>

                <button type="submit" class="pay-btn">PAY ₹99 NOW</button>
            </form>
            <a href="index.html" class="cancel-link">Cancel and Return</a>
        </div>
    </div>

</body>
</html>
